<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>93Ciné – Streaming HD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050509;
  --surface:#0d0d14;
  --card:#111118;
  --card2:#16161f;
  --accent:#ff2d4b;
  --accent2:#ff6b35;
  --gold:#ffd700;
  --text:#f2f2fa;
  --muted:#6e6e8a;
  --border:#ffffff0d;
  --border2:#ffffff1a;
  --glow:rgba(255,45,75,0.18);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:4px}

/* NOISE TEXTURE OVERLAY */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:0.4;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:0 3rem;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  transition:all 0.4s ease;
}
nav.scrolled{
  background:rgba(5,5,9,0.92);
  border-bottom:0.5px solid var(--border2);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.logo{
  font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;
  letter-spacing:1px;color:var(--text);cursor:pointer;
  display:flex;align-items:center;gap:2px;
}
.logo-dot{
  display:inline-block;width:8px;height:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:50%;margin:0 1px 14px;
}
.logo span{color:var(--accent)}
.nav-links{display:flex;gap:2.5rem;align-items:center}
.nav-links a{
  color:var(--muted);text-decoration:none;font-size:0.82rem;font-weight:500;
  cursor:pointer;transition:color 0.2s;letter-spacing:0.5px;
  position:relative;padding-bottom:2px;
}
.nav-links a::after{
  content:'';position:absolute;bottom:0;left:0;width:0;height:1px;
  background:var(--accent);transition:width 0.3s;
}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.search-box{
  background:rgba(255,255,255,0.04);
  border:0.5px solid var(--border2);border-radius:24px;
  padding:9px 16px;display:flex;align-items:center;gap:9px;
  transition:all 0.3s;
}
.search-box:focus-within{
  background:rgba(255,255,255,0.07);
  border-color:rgba(255,45,75,0.4);
  box-shadow:0 0 0 3px rgba(255,45,75,0.06);
}
.search-box input{
  background:none;border:none;outline:none;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:0.83rem;width:190px;
}
.search-box input::placeholder{color:var(--muted)}

/* HERO */
.hero{position:relative;height:100vh;min-height:640px;display:flex;align-items:center;overflow:hidden}
.hero-bg{
  position:absolute;inset:0;background-size:cover;background-position:center 20%;
  transform:scale(1.04);
  transition:transform 8s ease;
  filter:brightness(0.45);
}
.hero.loaded .hero-bg{transform:scale(1)}
.hero-vignette{
  position:absolute;inset:0;
  background:linear-gradient(105deg,rgba(5,5,9,0.97) 0%,rgba(5,5,9,0.65) 50%,rgba(5,5,9,0.15) 100%);
}
.hero-bottom{position:absolute;bottom:0;left:0;right:0;height:280px;background:linear-gradient(to top,var(--bg) 0%,transparent 100%)}
.hero-side{position:absolute;right:0;top:0;bottom:0;width:40%;background:linear-gradient(to left,rgba(5,5,9,0.3),transparent)}
.hero-content{
  position:relative;z-index:2;padding:0 3rem 0 3.5rem;max-width:680px;
  opacity:0;transform:translateY(30px);transition:all 0.9s ease;
}
.hero-content.visible{opacity:1;transform:translateY(0)}
.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,rgba(255,45,75,0.15),rgba(255,107,53,0.1));
  border:0.5px solid rgba(255,45,75,0.35);
  color:var(--accent);font-size:0.66rem;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  padding:6px 14px;border-radius:20px;margin-bottom:1.5rem;
}
.badge-pulse{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}
.hero-title{
  font-family:'Playfair Display',serif;font-size:4.8rem;line-height:1;
  letter-spacing:-1px;margin-bottom:1rem;
  background:linear-gradient(135deg,#ffffff 0%,#c8c8e0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-meta{
  display:flex;gap:1rem;align-items:center;margin-bottom:1.25rem;
  font-size:0.82rem;color:var(--muted);
}
.hero-meta .rating{color:var(--gold);font-weight:600;font-size:0.88rem}
.hero-meta .sep{width:1px;height:14px;background:var(--border2)}
.hero-desc{
  font-size:0.93rem;color:#9090b0;line-height:1.85;margin-bottom:2.5rem;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  max-width:520px;
}
.hero-btns{display:flex;gap:0.85rem;flex-wrap:wrap}
.btn-play{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;border:none;padding:14px 36px;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:all 0.3s;box-shadow:0 8px 30px rgba(255,45,75,0.3);
  letter-spacing:0.3px;
}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(255,45,75,0.45)}
.btn-play:active{transform:translateY(0)}
.btn-info{
  background:rgba(255,255,255,0.07);color:white;
  border:0.5px solid rgba(255,255,255,0.18);
  padding:14px 28px;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:0.9rem;
  cursor:pointer;transition:all 0.3s;backdrop-filter:blur(10px);
}
.btn-info:hover{background:rgba(255,255,255,0.13);border-color:rgba(255,255,255,0.3)}

/* CATEGORIES */
.cats-wrapper{
  padding:1.8rem 2.8rem 0.75rem;
  display:flex;gap:0.55rem;flex-wrap:wrap;
  border-bottom:0.5px solid var(--border);
  margin-bottom:0.5rem;
}
.cat-btn{
  background:rgba(255,255,255,0.04);border:0.5px solid var(--border2);
  color:var(--muted);padding:7px 18px;border-radius:20px;
  font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;
  cursor:pointer;transition:all 0.25s;
}
.cat-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--text);background:rgba(255,255,255,0.07)}
.cat-btn.active{
  background:linear-gradient(135deg,rgba(255,45,75,0.2),rgba(255,107,53,0.1));
  border-color:rgba(255,45,75,0.5);color:var(--accent);
}

/* SECTIONS */
.section{padding:1.75rem 2.8rem}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.section-title{
  font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;
  letter-spacing:0.3px;display:flex;align-items:center;gap:10px;
}
.section-title::before{
  content:'';width:3px;height:18px;
  background:linear-gradient(to bottom,var(--accent),var(--accent2));
  border-radius:2px;display:inline-block;
}
.see-all{color:var(--muted);font-size:0.75rem;cursor:pointer;transition:color 0.2s;letter-spacing:0.5px}
.see-all:hover{color:var(--accent)}
.cards-row{
  display:flex;gap:0.85rem;overflow-x:auto;padding-bottom:1rem;
  scrollbar-width:thin;scrollbar-color:#2a2a3a transparent;
}
.cards-row::-webkit-scrollbar{height:3px}
.cards-row::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}

/* MOVIE CARDS */
.movie-card{
  flex:0 0 150px;cursor:pointer;border-radius:12px;overflow:hidden;
  background:var(--card);border:0.5px solid var(--border);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),border-color 0.3s,box-shadow 0.3s;
  position:relative;
}
.movie-card:hover{
  transform:scale(1.07) translateY(-5px);
  border-color:rgba(255,45,75,0.4);
  box-shadow:0 16px 50px rgba(0,0,0,0.6),0 0 0 0.5px rgba(255,45,75,0.2);
}
.movie-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--card2)}
.card-info{padding:9px 11px 11px}
.card-title{font-size:0.76rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;color:var(--text)}
.card-year{font-size:0.68rem;color:var(--muted)}
.card-rating{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,0.8);
  color:var(--gold);font-size:0.66rem;font-weight:600;
  padding:3px 7px;border-radius:6px;
  backdrop-filter:blur(8px);
}
.card-hd{
  position:absolute;top:8px;left:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;font-size:0.58rem;font-weight:700;
  padding:2px 7px;border-radius:4px;letter-spacing:0.5px;
}
.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(5,5,9,0.97) 0%,rgba(5,5,9,0.3) 55%,transparent 100%);
  opacity:0;transition:opacity 0.3s;
  display:flex;align-items:flex-end;padding:10px;
}
.movie-card:hover .card-overlay{opacity:1}
.card-watch-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;border:none;padding:8px 0;border-radius:7px;
  font-family:'DM Sans',sans-serif;font-size:0.74rem;font-weight:600;
  cursor:pointer;width:100%;letter-spacing:0.3px;
  transition:filter 0.2s;
}
.card-watch-btn:hover{filter:brightness(1.1)}

/* SKELETON */
.skeleton{
  background:linear-gradient(90deg,var(--card) 25%,#1a1a26 50%,var(--card) 75%);
  background-size:200% 100%;animation:shimmer 1.8s infinite;border-radius:12px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{flex:0 0 150px;height:265px}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.85);
  display:none;align-items:center;justify-content:center;
  padding:1.5rem;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);border-radius:20px;width:100%;max-width:940px;
  overflow:hidden;border:0.5px solid rgba(255,255,255,0.1);
  max-height:92vh;overflow-y:auto;
  animation:modalIn 0.35s cubic-bezier(0.34,1.4,0.64,1) both;
  box-shadow:0 40px 120px rgba(0,0,0,0.8),0 0 0 0.5px rgba(255,255,255,0.05);
}
@keyframes modalIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-player{position:relative;width:100%;aspect-ratio:16/9;background:#000;display:none}
.modal-player iframe{width:100%;height:100%;border:none;display:block}
.modal-close-top{
  position:absolute;top:12px;right:12px;
  background:rgba(0,0,0,0.7);border:0.5px solid rgba(255,255,255,0.15);
  color:white;width:38px;height:38px;border-radius:50%;
  cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;
  z-index:10;transition:all 0.2s;backdrop-filter:blur(8px);
}
.modal-close-top:hover{background:var(--accent);border-color:var(--accent)}
.server-tabs{
  display:none;gap:8px;padding:12px 18px;
  background:rgba(0,0,0,0.5);
  border-bottom:0.5px solid var(--border);
  flex-wrap:wrap;align-items:center;
}
.server-label{font-size:0.73rem;color:var(--muted);font-weight:500}
.server-tab{
  background:rgba(255,255,255,0.05);border:0.5px solid var(--border2);
  color:var(--muted);padding:5px 14px;border-radius:20px;
  font-family:'DM Sans',sans-serif;font-size:0.75rem;cursor:pointer;transition:all 0.2s;
}
.server-tab:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
.server-tab.active{
  background:linear-gradient(135deg,rgba(255,45,75,0.2),rgba(255,107,53,0.1));
  border-color:rgba(255,45,75,0.5);color:var(--accent);
}
.modal-poster-row{display:flex;gap:2rem;padding:2rem}
.modal-poster{
  width:145px;flex-shrink:0;border-radius:12px;overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,0.6);border:0.5px solid var(--border2);
}
.modal-poster img{width:100%;display:block}
.modal-info{flex:1;min-width:0}
.modal-title{
  font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;
  line-height:1.1;margin-bottom:1rem;letter-spacing:-0.5px;
}
.modal-meta{
  display:flex;gap:0.75rem;font-size:0.8rem;color:var(--muted);
  margin-bottom:0.85rem;flex-wrap:wrap;align-items:center;
}
.modal-rating{color:var(--gold);font-weight:600;font-size:0.88rem}
.genre-tag{
  background:rgba(255,45,75,0.08);border:0.5px solid rgba(255,45,75,0.2);
  color:#ff7070;padding:3px 11px;border-radius:20px;font-size:0.7rem;
}
.modal-genres{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.modal-desc{font-size:0.87rem;color:#8888a8;line-height:1.9;margin-bottom:1.5rem}
.modal-btns{display:flex;gap:0.75rem;flex-wrap:wrap}

/* FOOTER */
footer{
  background:var(--surface);
  border-top:0.5px solid var(--border);
  padding:3rem;text-align:center;
  color:var(--muted);font-size:0.8rem;
  margin-top:2rem;position:relative;overflow:hidden;
}
footer::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:200px;height:1px;
  background:linear-gradient(to right,transparent,var(--accent),transparent);
}
.foot-logo{
  font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;
  color:var(--text);margin-bottom:0.75rem;letter-spacing:-0.5px;
}
.foot-logo span{color:var(--accent)}
.foot-links{display:flex;justify-content:center;gap:2rem;margin:1rem 0;flex-wrap:wrap}
.foot-links a{color:var(--muted);text-decoration:none;font-size:0.78rem;cursor:pointer;transition:color 0.2s}
.foot-links a:hover{color:var(--text)}

/* GENRE TABS BAR */
.genre-tabs-bar{
  display:none;align-items:center;gap:0;
  padding:0 2.8rem;
  border-bottom:0.5px solid var(--border2);
  background:rgba(5,5,9,0.8);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  position:sticky;top:68px;z-index:50;
}
.genre-tabs-bar.visible{display:flex}
.genre-tab-btn{
  padding:15px 30px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;
  color:var(--muted);background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 0.25s;letter-spacing:0.3px;
}
.genre-tab-btn:hover{color:var(--text)}
.genre-tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.genre-tab-count{
  margin-left:auto;font-size:0.76rem;color:var(--muted);padding-right:0.5rem;
}
/* GRID pour genre */
.genre-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:1rem;
  padding:2rem 2.8rem;
}
.genre-grid .movie-card{flex:none;width:100%}

/* TOAST */
.toast{
  position:fixed;bottom:2rem;right:2rem;
  background:var(--surface);border:0.5px solid var(--border2);
  border-left:3px solid var(--accent);
  color:var(--text);padding:13px 20px;border-radius:10px;
  font-size:0.83rem;z-index:300;
  transform:translateY(80px) scale(0.95);opacity:0;
  transition:all 0.35s cubic-bezier(0.34,1.4,0.64,1);pointer-events:none;
  backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.toast.show{transform:translateY(0) scale(1);opacity:1}

/* RESPONSIVE */
@media(max-width:768px){
  nav{padding:0 1.25rem}
  .nav-links{display:none}
  .hero-content{padding:0 1.5rem}
  .hero-title{font-size:2.8rem}
  .section{padding:1.25rem 1.25rem}
  .cats-wrapper{padding:1rem 1.25rem 0.5rem}
  .modal-poster-row{flex-direction:column;padding:1.25rem}
  .modal-poster{width:120px}
  .modal-title{font-size:1.6rem}
}
</style>
</head>
<body>

<nav id="navbar">
  <div class="logo" onclick="goHome()">93<div class="logo-dot"></div><span>Ciné</span></div>
  <div class="nav-links">
    <a class="active" onclick="goHome()">Accueil</a>
    <a onclick="filterByGenre('28','Action')">Action</a>
    <a onclick="filterByGenre('35','Comédie')">Comédie</a>
    <a onclick="filterByGenre('878','Sci-Fi')">Sci-Fi</a>
    <a onclick="filterByGenre('27','Horreur')">Horreur</a>
  </div>
  <div class="search-box">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6e6e8a" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Rechercher..." oninput="handleSearch(this.value)">
  </div>
</nav>

<section class="hero" id="heroSection">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-vignette"></div>
  <div class="hero-bottom"></div>
  <div class="hero-content" id="heroContent">
    <div class="hero-badge"><span class="badge-pulse"></span>À LA UNE CE SOIR</div>
    <div class="hero-title" id="heroTitle">Chargement…</div>
    <div class="hero-meta">
      <span class="rating" id="heroRating">⭐ —</span>
      <span class="sep"></span>
      <span id="heroYear">—</span>
      <span class="sep"></span>
      <span id="heroLang">—</span>
    </div>
    <p class="hero-desc" id="heroDesc">Veuillez patienter…</p>
    <div class="hero-btns">
      <button class="btn-play" onclick="heroWatch()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        Regarder
      </button>
      <button class="btn-info" onclick="heroDetails()">ℹ&nbsp; Plus d'infos</button>
    </div>
  </div>
</section>

<div class="cats-wrapper">
  <button class="cat-btn active" onclick="filterCat(this,'')">✦ Tous</button>
  <button class="cat-btn" onclick="filterCat(this,'28')">💥 Action</button>
  <button class="cat-btn" onclick="filterCat(this,'35')">😂 Comédie</button>
  <button class="cat-btn" onclick="filterCat(this,'18')">🎭 Drame</button>
  <button class="cat-btn" onclick="filterCat(this,'27')">👻 Horreur</button>
  <button class="cat-btn" onclick="filterCat(this,'878')">🚀 Science-Fiction</button>
  <button class="cat-btn" onclick="filterCat(this,'10749')">❤️ Romance</button>
  <button class="cat-btn" onclick="filterCat(this,'53')">🔪 Thriller</button>
  <button class="cat-btn" onclick="filterCat(this,'16')">🎨 Animation</button>
  <button class="cat-btn" onclick="filterCat(this,'12')">🌍 Aventure</button>
  <button class="cat-btn" onclick="filterCat(this,'80')">🕵️ Crime</button>
  <button class="cat-btn" onclick="filterCat(this,'36')">📜 Histoire</button>
</div>

<!-- ONGLETS FILMS / SÉRIES (visible seulement sur une catégorie) -->
<div class="genre-tabs-bar" id="genreTabsBar">
  <button class="genre-tab-btn active" id="tabFilms" onclick="switchGenreTab('films')">🎬 Films</button>
  <button class="genre-tab-btn" id="tabSeries" onclick="switchGenreTab('series')">📺 Séries</button>
  <span class="genre-tab-count" id="genreTabCount"></span>
</div>

<main id="sections"></main>

<footer>
  <div class="foot-logo">93<span>Ciné</span></div>
  <p>Le meilleur du cinéma, disponible partout, tout le temps.</p>
  <div class="foot-links">
    <a>Accueil</a><a>Films</a><a>Séries</a><a>Contact</a>
  </div>
  <p style="margin-top:0.5rem;font-size:0.7rem;opacity:0.3">© 2025 93Ciné — Tous droits réservés</p>
</footer>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalBox">
    <div class="modal-player" id="modalPlayer">
      <button class="modal-close-top" onclick="closeModal()">✕</button>
      <iframe id="playerIframe" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe>
    </div>
    <div class="server-tabs" id="serverTabs">
      <span class="server-label">Serveur :</span>
      <button class="server-tab active" onclick="switchServer(0,this)">🌐 VidSrc</button>
      <button class="server-tab" onclick="switchServer(1,this)">🎬 2Embed</button>
      <button class="server-tab" onclick="switchServer(2,this)">⚡ MultiEmbed</button>
      <button class="server-tab" onclick="switchServer(3,this)">🔥 VidLink</button>
    </div>
    <div class="modal-poster-row">
      <div class="modal-poster"><img id="modalPoster" src="" alt=""></div>
      <div class="modal-info">
        <div class="modal-title" id="modalTitle">Chargement…</div>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-genres" id="modalGenres"></div>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-btns">
          <button class="btn-play" onclick="watchMovie()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
            Regarder maintenant
          </button>
          <button class="btn-info" onclick="closeModal()">✕ Fermer</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='8265bd1679663a7ea12ac168da84d2e8';
let heroMovie=null,currentMovie=null,allMovies={},isSearch=false,currentServerId=0;
let searchTimer=null,currentGenreId=null,currentGenreTab='films';

function getServers(id, type='movie'){
  if(type==='tv') return[
    `https://vidsrc.cc/v2/embed/tv/${id}`,
    `https://www.2embed.cc/embedtv/${id}`,
    `https://multiembed.mov/?video_id=${id}&tmdb=1&tv=1`,
    `https://vidlink.pro/tv/${id}?autoplay=true`,
  ];
  return[
    `https://vidsrc.cc/v2/embed/movie/${id}`,
    `https://www.2embed.cc/embed/${id}`,
    `https://multiembed.mov/?video_id=${id}&tmdb=1`,
    `https://vidlink.pro/movie/${id}?autoplay=true`,
  ];
}

const SECTIONS=[
  {title:'🔥 Tendances du moment',url:'trending/movie/week'},
  {title:'⭐ Les mieux notés',url:'movie/top_rated'},
  {title:'🎬 Nouveautés en salle',url:'movie/now_playing'},
  {title:'🌍 Films populaires',url:'movie/popular'},
  {title:'💥 Action & Aventure',url:'discover/movie?with_genres=28,12&sort_by=popularity.desc'},
  {title:'😂 Comédies',url:'discover/movie?with_genres=35&sort_by=popularity.desc'},
  {title:'👻 Horreur & Thriller',url:'discover/movie?with_genres=27,53&sort_by=popularity.desc'},
  {title:'🚀 Science-Fiction',url:'discover/movie?with_genres=878&sort_by=popularity.desc'},
  {title:'❤️ Romance',url:'discover/movie?with_genres=10749&sort_by=popularity.desc'},
  {title:'🎭 Drames',url:'discover/movie?with_genres=18&sort_by=vote_average.desc&vote_count.gte=500'},
  {title:'🎨 Animation',url:'discover/movie?with_genres=16&sort_by=popularity.desc'},
  {title:'🕵️ Crime & Mystère',url:'discover/movie?with_genres=80&sort_by=popularity.desc'},
];

async function tmdb(url){
  const sep=url.includes('?')?'&':'?';
  const r=await fetch(`https://api.themoviedb.org/3/${url}${sep}api_key=${KEY}&language=fr-FR`);
  if(!r.ok)throw new Error();
  return r.json();
}

function imgUrl(p,s='w342'){return p?`https://image.tmdb.org/t/p/${s}${p}`:'https://placehold.co/150x225/111118/333?text=N/A';}
function skels(n=10){return Array(n).fill('<div class="skel-card skeleton"></div>').join('');}

function cardHtml(m, type='movie'){
  const title=m.title||m.name||'';
  const year=(m.release_date||m.first_air_date||'').slice(0,4);
  const rating=m.vote_average?m.vote_average.toFixed(1):'—';
  const t=type||m._type||'movie';
  return`<div class="movie-card" onclick="openModal(${m.id},'${t}')">
    <img src="${imgUrl(m.poster_path)}" alt="${title}" loading="lazy">
    <div class="card-hd">${t==='tv'?'SÉRIE':'HD'}</div>
    <div class="card-rating">⭐ ${rating}</div>
    <div class="card-overlay"><button class="card-watch-btn" onclick="event.stopPropagation();quickWatch(${m.id},'${t}')">▶ Regarder</button></div>
    <div class="card-info"><div class="card-title">${title}</div><div class="card-year">${year}</div></div>
  </div>`;
}

function sectionHtml(title,movies){
  if(!movies?.length)return'';
  return`<div class="section">
    <div class="section-header"><span class="section-title">${title}</span><a class="see-all">Voir tout →</a></div>
    <div class="cards-row">${movies.map(cardHtml).join('')}</div>
  </div>`;
}

async function loadHero(){
  try{
    const d=await tmdb('trending/movie/day');
    const picks=(d.results||[]).filter(m=>m.backdrop_path&&m.overview?.length>60);
    heroMovie=picks[Math.floor(Math.random()*Math.min(7,picks.length))];
    if(!heroMovie)return;
    const bg=document.getElementById('heroBg');
    const img=new Image();
    img.onload=()=>{
      bg.style.backgroundImage=`url(${imgUrl(heroMovie.backdrop_path,'original')})`;
      setTimeout(()=>{
        document.getElementById('heroSection').classList.add('loaded');
        document.getElementById('heroContent').classList.add('visible');
      },100);
    };
    img.src=imgUrl(heroMovie.backdrop_path,'original');
    document.getElementById('heroTitle').textContent=heroMovie.title;
    document.getElementById('heroRating').textContent=`⭐ ${heroMovie.vote_average.toFixed(1)}/10`;
    document.getElementById('heroYear').textContent=(heroMovie.release_date||'').slice(0,4);
    document.getElementById('heroLang').textContent=(heroMovie.original_language||'').toUpperCase();
    document.getElementById('heroDesc').textContent=heroMovie.overview;
    allMovies[heroMovie.id]=heroMovie;
    document.getElementById('heroContent').classList.add('visible');
  }catch(e){}
}

async function loadSections(){
  const container=document.getElementById('sections');
  container.innerHTML='';
  for(const cfg of SECTIONS){
    const wrap=document.createElement('div');
    wrap.innerHTML=`<div class="section"><div class="section-header"><span class="section-title">${cfg.title}</span></div><div class="cards-row">${skels()}</div></div>`;
    container.appendChild(wrap);
    try{
      const d=await tmdb(cfg.url);
      const movies=(d.results||[]).filter(m=>m.poster_path);
      movies.forEach(m=>allMovies[m.id]=m);
      wrap.innerHTML=sectionHtml(cfg.title,movies);
    }catch(e){wrap.remove();}
  }
}

async function openModal(id, type='movie'){
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('modalPlayer').style.display='none';
  document.getElementById('serverTabs').style.display='none';
  document.getElementById('playerIframe').src='';
  document.getElementById('modalTitle').textContent='Chargement…';
  document.getElementById('modalDesc').textContent='';
  document.getElementById('modalMeta').innerHTML='';
  document.getElementById('modalGenres').innerHTML='';
  document.getElementById('modalPoster').src='';
  currentServerId=0;
  // Détecter le type depuis allMovies si pas fourni
  const stored=allMovies[id];
  const t=type||(stored&&stored._type)||'movie';
  try{
    const m=await tmdb(`${t}/${id}`);
    currentMovie={...m,_type:t};
    allMovies[m.id]={...m,_type:t};
    document.getElementById('modalTitle').textContent=m.title||m.name;
    document.getElementById('modalPoster').src=imgUrl(m.poster_path,'w342');
    document.getElementById('modalDesc').textContent=m.overview||'Aucune description disponible.';
    const year=(m.release_date||m.first_air_date||'').slice(0,4);
    const runtime=m.runtime||(m.episode_run_time&&m.episode_run_time[0]);
    document.getElementById('modalMeta').innerHTML=`
      <span class="modal-rating">⭐ ${m.vote_average?.toFixed(1)||'—'}/10</span>
      <span>${year}</span>
      ${runtime?`<span>${runtime} min</span>`:''}
      ${t==='tv'?`<span>📺 Série</span>`:''}
      ${m.original_language?`<span>${m.original_language.toUpperCase()}</span>`:''}`;
    document.getElementById('modalGenres').innerHTML=(m.genres||[]).map(g=>`<span class="genre-tag">${g.name}</span>`).join('');
  }catch(e){closeModal();showToast('Erreur de chargement');}
}

function watchMovie(){
  if(!currentMovie)return;
  const t=currentMovie._type||'movie';
  document.getElementById('playerIframe').src=getServers(currentMovie.id,t)[currentServerId];
  document.getElementById('modalPlayer').style.display='block';
  document.getElementById('serverTabs').style.display='flex';
  document.getElementById('modalBox').scrollTop=0;
  showToast('▶ Lancement…');
}

function switchServer(idx,btn){
  currentServerId=idx;
  document.querySelectorAll('.server-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(currentMovie){
    const t=currentMovie._type||'movie';
    document.getElementById('playerIframe').src=getServers(currentMovie.id,t)[idx];
    showToast('Changement de serveur…');
  }
}

async function quickWatch(id,type='movie'){
  await openModal(id,type);
  setTimeout(watchMovie,500);
}

function heroWatch(){
  if(!heroMovie)return;
  currentMovie=heroMovie;
  openModal(heroMovie.id).then(()=>setTimeout(watchMovie,600));
}

function heroDetails(){if(heroMovie)openModal(heroMovie.id);}
function handleOverlayClick(e){if(e.target===document.getElementById('modal'))closeModal();}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('playerIframe').src='';
  document.getElementById('modalPlayer').style.display='none';
  document.getElementById('serverTabs').style.display='none';
  document.body.style.overflow='';
  currentMovie=null;
}

async function filterCat(btn,genre){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value='';
  isSearch=false;
  // Cacher la barre d'onglets si on revient à "Tous"
  if(!genre){
    currentGenreId=null;
    document.getElementById('genreTabsBar').classList.remove('visible');
    loadSections();
    return;
  }
  // Afficher la barre d'onglets
  currentGenreId=genre;
  currentGenreTab='films';
  document.getElementById('genreTabsBar').classList.add('visible');
  document.getElementById('tabFilms').classList.add('active');
  document.getElementById('tabSeries').classList.remove('active');
  await loadGenreContent(genre,'films');
}

async function switchGenreTab(tab){
  if(!currentGenreId)return;
  currentGenreTab=tab;
  document.getElementById('tabFilms').classList.toggle('active',tab==='films');
  document.getElementById('tabSeries').classList.toggle('active',tab==='series');
  await loadGenreContent(currentGenreId,tab);
}

async function loadGenreContent(genre,tab){
  const container=document.getElementById('sections');
  // Afficher skeletons en grille
  container.innerHTML=`<div class="genre-grid">${Array(16).fill('<div class="skel-card skeleton" style="height:265px"></div>').join('')}</div>`;
  try{
    const type=tab==='films'?'movie':'tv';
    const[p1,p2]=await Promise.all([
      tmdb(`discover/${type}?with_genres=${genre}&sort_by=popularity.desc&page=1`),
      tmdb(`discover/${type}?with_genres=${genre}&sort_by=popularity.desc&page=2`),
    ]);
    const items=[...(p1.results||[]),...(p2.results||[])]
      .filter(m=>m.poster_path)
      .filter((m,i,a)=>a.findIndex(x=>x.id===m.id)===i);
    items.forEach(m=>allMovies[m.id]={...m,_type:type});
    document.getElementById('genreTabCount').textContent=`${items.length} résultats`;
    if(!items.length){
      container.innerHTML=`<div style="padding:4rem;text-align:center;color:var(--muted)"><div style="font-size:3rem;margin-bottom:1rem">${tab==='films'?'🎬':'📺'}</div><div>Aucun résultat</div></div>`;
      return;
    }
    container.innerHTML=`<div class="genre-grid">${items.map(m=>cardHtml(m,type)).join('')}</div>`;
  }catch(e){container.innerHTML='';}
}

function filterByGenre(genre,name){
  const btn=Array.from(document.querySelectorAll('.cat-btn')).find(b=>b.textContent.includes(name));
  if(btn)filterCat(btn,genre);
}

function handleSearch(q){
  clearTimeout(searchTimer);
  if(!q.trim()){if(isSearch){isSearch=false;loadSections();}return;}
  searchTimer=setTimeout(async()=>{
    isSearch=true;
    currentGenreId=null;
    document.getElementById('genreTabsBar').classList.remove('visible');
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    const container=document.getElementById('sections');
    container.innerHTML=`<div class="section"><div class="cards-row">${skels()}</div></div>`;
    try{
      const[r1,r2]=await Promise.all([
        tmdb(`search/movie?query=${encodeURIComponent(q)}&page=1`),
        tmdb(`search/movie?query=${encodeURIComponent(q)}&page=2`),
      ]);
      const movies=[...(r1.results||[]),...(r2.results||[])]
        .filter(m=>m.poster_path)
        .filter((m,i,a)=>a.findIndex(x=>x.id===m.id)===i);
      movies.forEach(m=>allMovies[m.id]=m);
      container.innerHTML=movies.length
        ?sectionHtml(`Résultats pour "${q}" · ${movies.length} films`,movies)
        :`<div style="padding:4rem;text-align:center;color:var(--muted)"><div style="font-size:3rem;margin-bottom:1rem">🎬</div><div>Aucun résultat pour "<strong>${q}</strong>"</div></div>`;
    }catch(e){}
  },420);
}

function goHome(){
  isSearch=false;
  currentGenreId=null;
  document.getElementById('genreTabsBar').classList.remove('visible');
  document.getElementById('searchInput').value='';
  document.querySelectorAll('.cat-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  loadSections();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

window.addEventListener('scroll',()=>{
  document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>80);
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

loadHero();
loadSections();
</script>
</body>
</html>
